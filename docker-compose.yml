# JarvisQwen 模式 A：全自托管（一台便宜 VM 全搞定，如阿里云 ECS）
# 用法：docker compose up -d
# HTTPS：有域名时解开 caddy 注释并改 Caddyfile 中的域名

services:
  server:
    build: ./server
    restart: unless-stopped
    volumes:
      - ./data:/srv/data
    environment:
      - AAOS_DATA_DIR=/srv/data
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}  # 根目录 .env 中配置，启动时自动入库
      - AAOS_ACCESS_CODE=${AAOS_ACCESS_CODE:-}    # 设置后 /api 需带访问码（公网演示防烧额度）
      - AAOS_RATELIMIT_RPM=${AAOS_RATELIMIT_RPM:-240}
      - AAOS_RATELIMIT_ENABLED=${AAOS_RATELIMIT_ENABLED:-true}
    ports:
      # 仅绑本机回环：web 容器经 docker 内网 http://server:8000 访问，无需公网暴露。
      # 后端 API 不直接对外，攻击面只剩 3000（web 反代 /api）。SSH 内 curl localhost:8000 仍可用于取证。
      - "127.0.0.1:8000:8000"

  web:
    build: ./web
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://server:8000
    ports:
      # 80 = clean public URL that also passes restrictive egress firewalls (e.g. campus networks blocking :3000);
      # 3000 kept for backward compatibility with existing magic links.
      - "80:3000"
      - "3000:3000"
    depends_on:
      - server

